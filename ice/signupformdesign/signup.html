
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            width: 400px;
            margin: 50px auto;
            background: rgb(255, 255, 255);
            padding: 20px;
            position: relative;
            border-radius: 10%;
            border-color: #2d2db1;
            border-style: solid;
            border-width: 10px;
        }

        #CloseBtn {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        #header {
            color: white;
            text-shadow: 2px 2px #000000;
            text-align: center;
            background-image: url('images/jesus_feeds_5000.jpeg');
            background-size: cover;
            height: 150px;
        }

        h3 {
            text-align: center;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgb(255, 255, 255);
            padding: 20px;
        }

        #myForm section {
            grid-column: span 2;
            text-align: center;
        }

        .old, .new, .book, .doctrine, .pearl {
            height: 50px;
        }
    </style>




</head>

<body>
    <div id="formContainer">
                <button type="button" id="closeBtn">X</button>
            <div id="header">
            <p>Daily Feed</p>
            <p>Scripture a Day</p>
            </div>
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>

            <div>
                <img class=old alt="Old Testament" src="images/old_testament.webp">
                <img class=new alt="New Testament" src="images/new_testament.webp">
                <img class=book alt="Book of Mormon" src="images/book_of_mormon.webp">
                <img class=doctrine alt="Doctrine and Covenants" src="images/doctrine_and_covenants.webp">
                <img class=pearl alt="Pearl of Great Price" src="images/pearl_of_great_price.webp">
            </div>
        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
